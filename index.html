<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Super Mario Bros. Deluxe - GameBoy Classic</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div id="gameboy_shell">
      <!-- Screen Box -->
      <div class="screen-container">
        <div class="canvas-viewport">
          <canvas id="mainCanvas" width="160" height="144"></canvas>
        </div>
      </div>

      <!-- Controls Section -->
      <div class="controls-layout">
        <!-- D-PAD Cross -->
        <div class="dpad-cross">
          <div class="dpad-arm dpad-up" id="btn-up" data-gb-key="2">▲</div>
          <div class="dpad-arm dpad-down" id="btn-down" data-gb-key="3">▼</div>
          <div class="dpad-arm dpad-left" id="btn-left" data-gb-key="1">◄</div>
          <div class="dpad-arm dpad-right" id="btn-right" data-gb-key="0">►</div>
          <div class="dpad-center"></div>
        </div>

        <!-- Action Buttons B & A -->
        <div class="action-buttons">
          <div class="btn-circle-box" id="btn-b" data-gb-key="5">
            <div class="btn-circle"></div>
            <span class="btn-name">B</span>
          </div>
          <div class="btn-circle-box" id="btn-a" data-gb-key="4">
            <div class="btn-circle"></div>
            <span class="btn-name">A</span>
          </div>
        </div>
      </div>

      <!-- System Controls (Select & Start) -->
      <div class="system-controls">
        <div class="sys-btn-wrapper" id="btn-select" data-gb-key="6">
          <div class="sys-btn"></div>
          <span class="sys-txt">SELECT</span>
        </div>
        <div class="sys-btn-wrapper" id="btn-start" data-gb-key="7">
          <div class="sys-btn"></div>
          <span class="sys-txt">START</span>
        </div>
      </div>
    </div>

    <!-- Emulator Core Scripts -->
    <script src="js/emulator/mobile.js"></script>
    <script src="js/emulator/base64.js"></script>
    <script src="js/emulator/json2.js"></script>
    <script src="js/emulator/swfobject.js"></script>
    <script src="js/emulator/resampler.js"></script>
    <script src="js/emulator/XAudioServer.js"></script>
    <script src="js/emulator/resize.js"></script>
    <script src="js/emulator/GameBoyCore.js"></script>
    <script src="js/emulator/GameBoyIO.js"></script>

    <!-- Game Logic & Controls Scripts -->
    <script src="js/game/controls.js"></script>
    <script src="js/game/save_system.js"></script>
    <script src="js/game/loader.js"></script>
  </body>
</html>
